<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAKOS — Encurtador</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg      : #0a0a0a;
      --surface : #111111;
      --border  : #1f1f1f;
      --red     : #cc0000;
      --red2    : #ff1a1a;
      --text    : #f0f0f0;
      --muted   : #555555;
      --mono    : 'JetBrains Mono', monospace;
      --title   : 'Bebas Neue', sans-serif;
      --sans    : 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ── Header ── */
    header {
      max-width: 780px;
      margin: 0 auto 50px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
    }

    .logo-text h1 {
      font-family: var(--title);
      font-size: 2.8rem;
      letter-spacing: 4px;
      line-height: 1;
      color: var(--text);
    }

    .logo-text h1 span { color: var(--red); }

    .logo-text p {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      max-width: 780px;
      margin: 0 auto 24px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--red);
      border-radius: 4px 0 0 4px;
    }

    .card h2 {
      font-family: var(--mono);
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--red);
      margin-bottom: 20px;
    }

    /* ── Inputs ── */
    .row { display: flex; gap: 10px; flex-wrap: wrap; }

    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .88rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus { border-color: var(--red); }
    #url    { flex: 1; min-width: 260px; }
    #codigo { width: 160px; }

    button.btn-primary {
      background: var(--red);
      border: none;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
      font-family: var(--title);
      font-size: 1.1rem;
      letter-spacing: 2px;
      padding: 12px 28px;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    button.btn-primary:hover  { background: var(--red2); }
    button.btn-primary:active { transform: scale(.97); }

    /* ── Resultado ── */
    #resultado {
      display: none;
      margin-top: 18px;
      background: var(--bg);
      border: 1px solid var(--red);
      border-radius: 3px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: .88rem;
      align-items: center;
      gap: 12px;
    }
    #resultado a {
      color: var(--red2);
      flex: 1;
      word-break: break-all;
      text-decoration: none;
    }
    .btn-copy {
      background: var(--border);
      border: none;
      border-radius: 3px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--mono);
      font-size: .75rem;
      padding: 6px 14px;
      transition: background .15s;
    }
    .btn-copy:hover { background: var(--red); }

    /* ── Tabela ── */
    .links-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .badge {
      background: var(--border);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: .72rem;
      padding: 4px 10px;
      color: var(--muted);
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      font-size: .88rem;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(204,0,0,.04); }

    .link-curto {
      color: var(--red2);
      font-family: var(--mono);
      font-size: .82rem;
      text-decoration: none;
    }
    .link-curto:hover { text-decoration: underline; }

    .url-destino {
      color: var(--muted);
      font-size: .78rem;
      font-family: var(--mono);
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cliques {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--red);
    }

    .data {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .75rem;
    }

    .btn-del {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      cursor: pointer;
      font-size: .75rem;
      padding: 4px 10px;
      transition: all .15s;
    }
    .btn-del:hover { border-color: var(--red); color: var(--red); }

    .empty {
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      padding: 40px;
      font-size: .85rem;
    }

    footer {
      max-width: 780px;
      margin: 40px auto 0;
      text-align: center;
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<header>
  <!-- Logo dragão minimalista -->
  <svg class="logo-icon" viewBox="0 0 48 48" fill="none">
    <polygon points="24,2 38,10 38,26 24,34 10,26 10,10" fill="none" stroke="#cc0000" stroke-width="1.5"/>
    <polygon points="24,10 32,15 32,25 24,30 16,25 16,15" fill="none" stroke="#cc0000" stroke-width="1"/>
    <polygon points="24,18 27,20 27,24 24,26 21,24 21,20" fill="#cc0000"/>
    <line x1="20" y1="6" x2="14" y2="0" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="6" x2="34" y2="0" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
  </svg>

  <div class="logo-text">
    <h1>DRAK<span>OS</span></h1>
    <p>// link shortener</p>
  </div>
</header>

<!-- Formulário -->
<div class="card">
  <h2>Novo Link</h2>
  <div class="row">
    <input type="text" id="url" placeholder="Cole o link de afiliado aqui...">
    <input type="text" id="codigo" placeholder="código (ex: copa2026)">
    <button class="btn-primary" onclick="encurtar()">ENCURTAR</button>
  </div>
  <div id="resultado">
    <a id="link-gerado" href="#" target="_blank"></a>
    <button class="btn-copy" onclick="copiar()">COPIAR</button>
  </div>
</div>

<!-- Tabela -->
<div class="card">
  <div class="links-header">
    <h2>Links Ativos</h2>
    <span class="badge" id="total">0 links</span>
  </div>
  <table>
    <thead>
      <tr>
        <th>Link</th>
        <th>Destino</th>
        <th>Cliques</th>
        <th>Criado em</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">Nenhum link ainda. ↑</div>
</div>

<footer>DRAKOS © 2026 — TODOS OS DIREITOS RESERVADOS</footer>

<script>
  let links = {{ links | tojson }};

  function renderizar() {
    const tbody   = document.getElementById('tbody');
    const empty   = document.getElementById('empty');
    const total   = document.getElementById('total');
    const entradas = Object.entries(links);

    total.textContent = `${entradas.length} link${entradas.length !== 1 ? 's' : ''}`;

    if (entradas.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = entradas.map(([codigo, info]) => `
      <tr>
        <td><a class="link-curto" href="/${codigo}" target="_blank">/${codigo}</a></td>
        <td><div class="url-destino" title="${info.url}">${info.url}</div></td>
        <td><span class="cliques">${info.cliques}</span></td>
        <td><span class="data">${info.criado_em}</span></td>
        <td><button class="btn-del" onclick="deletar('${codigo}')">✕</button></td>
      </tr>
    `).join('');
  }

  async function encurtar() {
    const url    = document.getElementById('url').value.trim();
    const codigo = document.getElementById('codigo').value.trim()
                   .toLowerCase()
                   .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                   .replace(/[^a-z0-9-]/g, '-');

    if (!url) { alert('Cole um link primeiro!'); return; }

    const res  = await fetch('/encurtar', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ url, codigo })
    });
    const data = await res.json();
    if (data.erro) { alert(data.erro); return; }

    links[data.codigo] = {
      url,
      cliques   : 0,
      criado_em : new Date().toLocaleString('pt-BR')
    };
    renderizar();

    const resultado  = document.getElementById('resultado');
    const linkGerado = document.getElementById('link-gerado');
    linkGerado.href        = data.link_curto;
    linkGerado.textContent = data.link_curto;
    resultado.style.display = 'flex';

    document.getElementById('url').value    = '';
    document.getElementById('codigo').value = '';
  }

  async function deletar(codigo) {
    if (!confirm(`Deletar /${codigo}?`)) return;
    await fetch(`/deletar/${codigo}`, { method: 'DELETE' });
    delete links[codigo];
    renderizar();
  }

  function copiar() {
    navigator.clipboard.writeText(document.getElementById('link-gerado').href);
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ COPIADO';
    setTimeout(() => btn.textContent = 'COPIAR', 2000);
  }

  renderizar();
</script>

</body>
</html>
