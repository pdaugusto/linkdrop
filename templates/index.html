<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkDrop — Encurtador de Afiliados</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg       : #0d0f14;
      --surface  : #151820;
      --border   : #1e2330;
      --accent   : #00e5a0;
      --accent2  : #0099ff;
      --text     : #e8ecf4;
      --muted    : #5a6278;
      --danger   : #ff4f6a;
      --mono     : 'JetBrains Mono', monospace;
      --sans     : 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      max-width: 760px;
      margin: 0 auto 48px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    header h1 span { color: var(--accent); }
    header p {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .85rem;
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 760px;
      margin: 0 auto 32px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .9rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    #url    { flex: 1; min-width: 280px; }
    #codigo { width: 160px; }

    button.btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .95rem;
      font-weight: 700;
      padding: 12px 28px;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    button.btn-primary:hover  { opacity: .85; }
    button.btn-primary:active { transform: scale(.97); }

    #resultado {
      display: none;
      margin-top: 20px;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: .9rem;
      align-items: center;
      gap: 12px;
    }
    #resultado a {
      color: var(--accent);
      flex: 1;
      word-break: break-all;
      text-decoration: none;
    }
    #resultado a:hover { text-decoration: underline; }
    .btn-copy {
      background: var(--border);
      border: none;
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: .8rem;
      padding: 6px 14px;
      transition: background .15s;
    }
    .btn-copy:hover { background: var(--accent); color: #000; }

    .links-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .badge {
      background: var(--border);
      border-radius: 20px;
      font-family: var(--mono);
      font-size: .75rem;
      padding: 4px 12px;
      color: var(--muted);
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .link-curto {
      color: var(--accent2);
      font-family: var(--mono);
      font-size: .85rem;
      text-decoration: none;
    }
    .link-curto:hover { text-decoration: underline; }

    .url-destino {
      color: var(--muted);
      font-size: .8rem;
      font-family: var(--mono);
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cliques {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--accent);
    }

    .data {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .78rem;
    }

    .btn-del {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: .75rem;
      padding: 4px 10px;
      transition: all .15s;
    }
    .btn-del:hover { border-color: var(--danger); color: var(--danger); }

    .empty {
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      padding: 40px;
      font-size: .9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Link<span>Drop</span></h1>
  <p>// encurtador de links para afiliados</p>
</header>

<div class="card">
  <h2>Novo Link</h2>
  <div class="row">
    <input type="text" id="url"    placeholder="Cole o link de afiliado aqui...">
    <input type="text" id="codigo" placeholder="código (opcional)">
    <button class="btn-primary" onclick="encurtar()">Encurtar →</button>
  </div>
  <div id="resultado">
    <a id="link-gerado" href="#" target="_blank"></a>
    <button class="btn-copy" onclick="copiar()">Copiar</button>
  </div>
</div>

<div class="card">
  <div class="links-header">
    <h2>Seus Links</h2>
    <span class="badge" id="total">0 links</span>
  </div>
  <table id="tabela">
    <thead>
      <tr>
        <th>Link Curto</th>
        <th>Destino</th>
        <th>Cliques</th>
        <th>Criado em</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">Nenhum link ainda. Crie o primeiro! ↑</div>
</div>

<script>
  let links = {{ links | tojson }};

  function renderizar() {
    const tbody   = document.getElementById('tbody');
    const empty   = document.getElementById('empty');
    const total   = document.getElementById('total');
    const entradas = Object.entries(links);

    total.textContent = `${entradas.length} link${entradas.length !== 1 ? 's' : ''}`;

    if (entradas.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = entradas.map(([codigo, info]) => `
      <tr>
        <td><a class="link-curto" href="/${codigo}" target="_blank">/${codigo}</a></td>
        <td><div class="url-destino" title="${info.url}">${info.url}</div></td>
        <td><span class="cliques">${info.cliques}</span></td>
        <td><span class="data">${info.criado_em}</span></td>
        <td><button class="btn-del" onclick="deletar('${codigo}')">✕</button></td>
      </tr>
    `).join('');
  }

  async function encurtar() {
    const url    = document.getElementById('url').value.trim();
    const codigo = document.getElementById('codigo').value.trim();

    if (!url) { alert('Cole um link primeiro!'); return; }

    const res  = await fetch('/encurtar', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ url, codigo })
    });
    const data = await res.json();

    if (data.erro) { alert(data.erro); return; }

    links[data.codigo] = {
      url,
      cliques   : 0,
      criado_em : new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
    };
    renderizar();

    const resultado  = document.getElementById('resultado');
    const linkGerado = document.getElementById('link-gerado');
    linkGerado.href        = data.link_curto;
    linkGerado.textContent = data.link_curto;
    resultado.style.display = 'flex';

    document.getElementById('url').value    = '';
    document.getElementById('codigo').value = '';
  }

  async function deletar(codigo) {
    if (!confirm(`Deletar /${codigo}?`)) return;
    await fetch(`/deletar/${codigo}`, { method: 'DELETE' });
    delete links[codigo];
    renderizar();
  }

  function copiar() {
    const link = document.getElementById('link-gerado').href;
    navigator.clipboard.writeText(link);
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  }

  renderizar();
</script>

</body>
</html>
